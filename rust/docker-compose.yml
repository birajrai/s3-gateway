version: '3.8'

services:
  s3:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - s3_data:/app/data
    environment:
      - S3_DATA_DIR=/app/data
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_DEBUG=${S3_DEBUG:-false}
    restart: unless-stopped

volumes:
  s3_data: