version: '3.8'

services:
  s3:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - s3_data:/var/www/html/data
    environment:
      - DATA_DIR=/var/www/html/data
      - APP_DEBUG=${APP_DEBUG:-false}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    restart: unless-stopped

volumes:
  s3_data: